name: Bug report
description: Report a problem with the Catchlight app
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. **Do not include your Privacy Phrase, Take contents, or any
        personal data** — Catchlight is zero-knowledge and we never need it to help you.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version
      description: Settings → About (e.g. 1.0.0)
    validations:
      required: false
  - type: input
    id: ios-device
    attributes:
      label: iOS version & device
      placeholder: "iOS 18.5, iPhone 15"
    validations:
      required: false
  - type: checkboxes
    id: privacy-check
    attributes:
      label: Privacy check
      options:
        - label: I have not included my Privacy Phrase, Take contents, or other personal data.
          required: true
