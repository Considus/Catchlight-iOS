name: Feature request
description: Suggest an idea for Catchlight
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the need or frustration behind the request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Catchlight to do?
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Note: Catchlight's non-negotiables — zero-knowledge, encryption always on, offline-first,
        no telemetry — are fixed (see the README). Requests that conflict with these can't be accepted.
