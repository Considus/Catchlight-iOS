name: CI

# Task 6.17 — run the full test suite on every push to main and every PR
# targeting main. Two jobs run in parallel:
#
#   core-tests  — `swift test` + `swift run coreverify` against the
#                 CatchlightCore SPM package. No Xcode project needed.
#   xcode-tests — `xcodebuild test` against the iOS simulator. This is the job
#                 that runs the iOS-only suites gated by
#                 `#if canImport(Catchlight)` — roughly half the test files
#                 (Keychain, PIN, SQLite store, file protection, settings,
#                 subscription, reminders, UI state, plus the XCUITest bundle).
#                 The macOS `swift test` job alone is NOT a full signal.
#
# Both jobs must pass before this commit is mergeable — these are the status
# checks wired into branch protection in 6.18.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run for the same branch / PR when a new commit arrives —
# saves runner minutes without losing the final-commit signal.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-tests:
    name: Core (swift test + coreverify)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      # Intentionally not pinning the Xcode version — the macos-15 image ships
      # multiple side-by-side Xcodes (16.x and newer). Letting the runner use
      # its default keeps `OS=latest` and the newer simulator runtimes
      # resolvable. If a future image bump removes a needed runtime, pin here.

      # SPM resolves CryptoKit (system) and no third-party deps today, so the
      # cache mostly saves index/build artefacts between runs. The key hashes
      # Package.swift only — Package.resolved is gitignored so it never exists
      # at checkout (the previous key listed it, which silently degenerated to
      # the same thing). Commit Package.resolved and add it back here the day a
      # third-party dependency lands.
      - name: Cache SwiftPM
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: swift test
        run: swift test --enable-code-coverage

      - name: swift run coreverify
        run: swift run coreverify

  release-build:
    # Compile check in the RELEASE configuration. `xcodebuild test` runs Debug
    # only, so a Release-only compile break (e.g. a symbol declared inside
    # `#if DEBUG` but used in shipping code — hit 2026-07-01 with
    # SettingsView.showNoticeHistory) kept all checks green while every
    # archive failed. A generic-simulator build needs no signing identities
    # and no simulator runtime boot, so this job is cheap.
    name: iOS (Release build)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache SwiftPM
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-xcode-spm-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-xcode-spm-

      - name: xcodebuild build (Release)
        run: |
          xcodebuild build \
            -project Catchlight.xcodeproj \
            -scheme Catchlight \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator'

  xcode-tests:
    name: iOS (xcodebuild test)
    runs-on: macos-15
    strategy:
      # D-039 (2026-06-14): the deployment floor is iOS 18, so test the FLOOR
      # (iOS 18) and CURRENT (OS=latest) — the iOS 17 legs are dropped. fail-fast
      # off so a failure on one runtime still reports the other.
      fail-fast: false
      matrix:
        destination:
          # The floor leg just needs SOME iOS 18 runtime. The macos-15 image
          # dropped the exact 18.0 runtime (2026-06-15: now ships 18.5 / 18.6 +
          # 26.x), so this is pinned to the lowest available 18.x. Bump again if a
          # future image drops 18.5 too (check the "List available simulators" step).
          #
          # ⚠️ These matrix strings ARE the status-check names on branch protection
          # (e.g. "iOS (xcodebuild test) (platform=iOS Simulator,name=iPhone 16,
          # OS=18.5)"). Editing one renames its check, and the old name stays
          # required and never reports — which blocks every merge to main until
          # branch protection is updated to match. Change both together.
          - 'platform=iOS Simulator,name=iPhone 16,OS=18.5'
          - 'platform=iOS Simulator,name=iPhone 16,OS=latest'
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      # Intentionally not pinning the Xcode version — the macos-15 image ships
      # multiple side-by-side Xcodes (16.x and newer). Letting the runner use
      # its default keeps `OS=latest` and the newer simulator runtimes
      # resolvable. If a future image bump removes a needed runtime, pin here.

      - name: Install XcodeGen
        # XcodeGen is not pre-installed on the macos-15 image. Brew is fastest.
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # Cache only the swiftpm download cache for the xcodebuild job: the
      # previous cache listed `.build` (which xcodebuild never touches) and a
      # `DerivedData/SourcePackages` path that doesn't exist (Xcode nests
      # SourcePackages under DerivedData/<Project>-<hash>/), so it restored
      # nothing while costing save/restore time.
      - name: Cache SwiftPM
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-xcode-spm-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-xcode-spm-

      - name: Disable simulator hardware keyboard
        # Guards against the classic XCUITest `typeText` flake on CI runners:
        # with the hardware keyboard connected the software keyboard never
        # appears and typing fails with kAXErrorCannotComplete (hit on run
        # 27280916290, Flow 5).
        run: defaults write com.apple.iphonesimulator ConnectHardwareKeyboard -bool false

      - name: List available simulators (debug)
        # Surfaced in the run log so future failures pinning a destination are
        # easy to diagnose without re-running.
        run: xcrun simctl list devices available | grep -E "iPhone|iOS" | head -30

      - name: xcodebuild test
        # NOTE (2026-06-10): do NOT pass CODE_SIGNING_ALLOWED=NO. Simulator
        # builds use default AD-HOC signing, which needs no identities on the
        # runner but DOES embed the entitlements — with signing fully disabled
        # the app has no application-identifier and EVERY keychain operation
        # fails with errSecMissingEntitlement (-34018) on current runtimes,
        # taking the PIN/mnemonic keychain suites down with it.
        #
        # Destinations come from the matrix: the iOS 18 deployment floor (D-039)
        # and OS=latest. FileProtectionTests self-skips on simulator via XCTSkip.
        #
        # The Catchlight scheme's test action runs BOTH `CatchlightTests`
        # (unit tests — Tests/CatchlightCoreTests + Tests/CatchlightAppTests) and
        # `CatchlightUITests` (XCUITest for the six core flows, the two-tap
        # regression anchor, and the block-editor / Angle flows — workplan 7.4 /
        # 7.5). The scheme is declared explicitly in project.yml because
        # XcodeGen's auto-scheme does NOT include the `bundle.ui-testing` target.
        #
        # FLAKY-XCUITEST ABSORPTION (2026-06-16): the synthesized-gesture UI flows
        # (BlockEditor / CoreFlows) could miss an element that IS present in the
        # accessibility tree — a simulator timing race the suite documents (and
        # self-skip-guards in places). The races are now fixed at the source: the
        # XCUITest interactions route through `tapWhenReady` / `tapUntil` (re-issue
        # a dropped synthesized tap) in UITestSupport, and the reachability helpers
        # wait 5s and re-issue their single interaction. (This also uncovered a real
        # wrong-locator bug — the "editor-shape" footer Iris is an `Other`, not a
        # `Button`, on iOS 18.x — that `-retry` could never have absorbed.) Verified
        # locally green over 3–5 iterations on the iOS 18.6 leg.
        #
        # The stopgap is therefore REDUCED from 3 iterations to 2 (a single retry):
        # `-retry-tests-on-failure` reruns ONLY a failed test once, so a lone CI
        # flake on the OS=latest leg (different hardware, not verified locally)
        # still can't block a merge, while a genuinely broken test fails both
        # attempts and does. Unit/Core tests pass first try, so they're never
        # retried. Drop `-test-iterations` entirely once a few real runs confirm
        # the suite is green without the cushion.
        run: |
          xcodebuild test \
            -project Catchlight.xcodeproj \
            -scheme Catchlight \
            -destination '${{ matrix.destination }}' \
            -retry-tests-on-failure \
            -test-iterations 2
