# project.yml — XcodeGen specification for the Catchlight iOS app.
#
# Why XcodeGen rather than a checked-in .xcodeproj: a hand-written project.pbxproj
# is large, opaque, and merge-hostile. This declarative spec generates a correct,
# reproducible Xcode project with `xcodegen generate`, and is the single source of
# truth for deployment target, bundle id, entitlements, Info.plist, App Group, and
# the dependency set required by Phase 5 (brief §3).
#
#   brew install xcodegen   # one-time
#   xcodegen generate       # produces Catchlight.xcodeproj
#
# All settings here trace directly to Phase 5 brief §3.1–§3.4.

name: Catchlight
options:
  bundleIdPrefix: com.considus
  deploymentTarget:
    iOS: "17.0"            # brief §3.1 — iOS 17.0 minimum (Secure Enclave guaranteed)
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: YTPP9HU9F9 # Mark Stradling (brief §3.1)
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  # The platform-agnostic core (this repo). Pure Swift + CryptoKit.
  CatchlightCore:
    path: .

  # NOTE (2026-06-05): the previous `CArgon2` vendored package has been removed.
  # Master-key derivation now uses HKDF-SHA-256 via CryptoKit (see
  # CatchlightCore/Crypto/MasterKeyDerivation.swift); the BIP-39 mnemonic already
  # carries 128 bits of entropy so a memory-hard KDF is unnecessary. No third-party
  # crypto library is required for the master key.

  # NOTE (2026-06-05, revised): the SQLCipher SPM dependency has been removed.
  # Content security is provided by per-item AES-256-GCM (CatchlightCore.TakeCrypto)
  # and file security by `NSFileProtectionCompleteUntilFirstUserAuthentication` on
  # the database file (see Catchlight/Database/SQLCipherStore.swift). The store
  # opens the iOS SDK's built-in `SQLite3` Clang module — no third-party crypto
  # library is required.

targets:
  Catchlight:
    type: application
    platform: iOS
    # CAPABILITIES NOTE (2026-06-06): the App Groups + Keychain Sharing capabilities
    # are configured solely via the entitlements file (`Catchlight.entitlements`),
    # NOT via XcodeGen's `attributes.SystemCapabilities` block. We tried the
    # SystemCapabilities approach and it serialised as a quoted JSON string in
    # `project.pbxproj` (XcodeGen limitation with nested dicts under `attributes`),
    # which confused Xcode and caused it to offer to "fix" the project — accepting
    # that prompt wiped the entitlements file back to `<dict/>`.
    #
    # Modern Xcode (14+) reads capabilities from the entitlements file directly, so
    # the Signing & Capabilities tab will display App Groups + Keychain Sharing
    # correctly as long as `Catchlight.entitlements` has the right keys.
    #
    # If you EVER see Xcode prompt to "Fix" a capability or the team — cancel.
    # Re-running `xcodegen generate` is safe; it does not touch the entitlements
    # file.
    sources:
      - path: Catchlight
    info:
      path: Catchlight/Resources/Info.plist
      properties:
        UIAppFonts:
          - "CormorantGaramond[wght].ttf"
          - "CormorantGaramond-Italic[wght].ttf"
          - "DMSans[opsz,wght].ttf"
        # Without UILaunchScreen, iOS 13+ runs the app in legacy compatibility mode
        # (letterboxed, doesn't fill the screen). An empty UILaunchScreen dict is
        # enough to opt in to full-screen modern scene sizing.
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSupportsIndirectInputEvents: true
        # Required so BGTaskScheduler will register the sync refresh task —
        # without this, BackgroundTasks rejects the registration at launch
        # ("com.considus.catchlight.sync is not advertised in the application's
        # Info.plist").
        BGTaskSchedulerPermittedIdentifiers:
          - com.considus.catchlight.sync
        # Portrait-only — onboarding layout (StepScaffold, Dynamic Island padding,
        # ScrollView safe-area handling) is designed for portrait. UIRequiresFullScreen
        # is needed alongside a restricted orientation set to silence Xcode's
        # "All interface orientations must be supported unless the app requires
        # full screen" validation warning.
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
    entitlements:
      # XcodeGen rewrites this file on every `generate` run. The contents below
      # ARE the source of truth — do not hand-edit Catchlight.entitlements; edit
      # the properties here and re-run xcodegen. (Hand-edits get wiped on the
      # next generate; we hit this on 2026-06-06.)
      path: Catchlight/Resources/Catchlight.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.considus.catchlight
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.considus.catchlight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.considus.catchlight   # brief §3.1
        CODE_SIGN_ENTITLEMENTS: Catchlight/Resources/Catchlight.entitlements
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        SWIFT_OBJC_BRIDGING_HEADER: ""
    dependencies:
      - package: CatchlightCore
        product: CatchlightCore

  CatchlightTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/CatchlightCoreTests
      # `EnglishWordlistTests` loads bip39-english.txt from
      # `Bundle(for: Self.self)` (the test bundle). Without this entry the
      # resource is only in the app bundle and the test fails on CI with
      # "bip39-english.txt missing from app bundle".
      - path: Catchlight/Resources/bip39-english.txt
        buildPhase: resources
    settings:
      base:
        # Device code-signing requires an Info.plist on the test bundle. We don't
        # need any custom keys, so let Xcode synthesize one. Without this, running
        # tests on a physical iPhone fails with "Cannot code sign because the
        # target does not have an Info.plist file…" (hit 2026-06-06 on iPhone 17).
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.considus.catchlight.tests
    dependencies:
      - target: Catchlight
      - package: CatchlightCore
        product: CatchlightCore

# v1.1 extension targets (Share Extension, WidgetKit, App Intents) are NOT defined
# here — they are out of scope for v1.0 (brief §14). Their PREREQUISITES (App Group
# + shared Keychain access group) are already configured in the entitlements above,
# so adding them later requires no migration (brief §10.1).
