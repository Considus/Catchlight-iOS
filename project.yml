# project.yml â€” XcodeGen specification for the Catchlight iOS app.
#
# Why XcodeGen rather than a checked-in .xcodeproj: a hand-written project.pbxproj
# is large, opaque, and merge-hostile. This declarative spec generates a correct,
# reproducible Xcode project with `xcodegen generate`, and is the single source of
# truth for deployment target, bundle id, entitlements, Info.plist, App Group, and
# the dependency set required by Phase 5 (brief Â§3).
#
#   brew install xcodegen   # one-time
#   xcodegen generate       # produces Catchlight.xcodeproj
#
# All settings here trace directly to Phase 5 brief Â§3.1â€“Â§3.4.

name: Catchlight
options:
  bundleIdPrefix: com.considus
  deploymentTarget:
    iOS: "17.0"            # brief Â§3.1 â€” iOS 17.0 minimum (Secure Enclave guaranteed)
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: YTPP9HU9F9 # Mark Stradling (brief Â§3.1)
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  # The platform-agnostic core (this repo). Pure Swift + CryptoKit.
  CatchlightCore:
    path: .

  # NOTE (2026-06-05): the previous `CArgon2` vendored package has been removed.
  # Master-key derivation now uses HKDF-SHA-256 via CryptoKit (see
  # CatchlightCore/Crypto/MasterKeyDerivation.swift); the BIP-39 mnemonic already
  # carries 128 bits of entropy so a memory-hard KDF is unnecessary. No third-party
  # crypto library is required for the master key.

  # NOTE (2026-06-05, revised): the SQLCipher SPM dependency has been removed.
  # Content security is provided by per-item AES-256-GCM (CatchlightCore.TakeCrypto)
  # and file security by `NSFileProtectionCompleteUntilFirstUserAuthentication` on
  # the database file (see Catchlight/Database/SQLCipherStore.swift). The store
  # opens the iOS SDK's built-in `SQLite3` Clang module â€” no third-party crypto
  # library is required.

targets:
  Catchlight:
    type: application
    platform: iOS
    # CAPABILITIES NOTE (2026-06-06): the App Groups + Keychain Sharing capabilities
    # are configured solely via the entitlements file (`Catchlight.entitlements`),
    # NOT via XcodeGen's `attributes.SystemCapabilities` block. We tried the
    # SystemCapabilities approach and it serialised as a quoted JSON string in
    # `project.pbxproj` (XcodeGen limitation with nested dicts under `attributes`),
    # which confused Xcode and caused it to offer to "fix" the project â€” accepting
    # that prompt wiped the entitlements file back to `<dict/>`.
    #
    # Modern Xcode (14+) reads capabilities from the entitlements file directly, so
    # the Signing & Capabilities tab will display App Groups + Keychain Sharing
    # correctly as long as `Catchlight.entitlements` has the right keys.
    #
    # If you EVER see Xcode prompt to "Fix" a capability or the team â€” cancel.
    # Re-running `xcodegen generate` is safe; it does not touch the entitlements
    # file.
    sources:
      - path: Catchlight
        # Task 6.20 â€” exclude the StoreKit configuration from the default
        # recursive include so it doesn't get bundled as a resource in Release.
        excludes:
          - "Resources/Catchlight.storekit"
      # Local StoreKit configuration for sandbox testing of the paywall. The
      # file is referenced in the project so the Debug scheme can bind to it,
      # but `buildPhase: none` keeps it out of the built bundle. Release
      # archives have no scheme pointing here, so production sales go through
      # the real App Store.
      - path: Catchlight/Resources/Catchlight.storekit
        buildPhase: none
    info:
      path: Catchlight/Resources/Info.plist
      properties:
        UIAppFonts:
          - "CormorantGaramond[wght].ttf"
          - "CormorantGaramond-Italic[wght].ttf"
          - "DMSans[opsz,wght].ttf"
        # UILaunchScreen: opts into modern full-screen scene sizing (required, see
        # gotcha #1 in iOS gotchas). UIColorName references the ck-background colour
        # set in Assets.xcassets (light: Paper #F7F4EF, dark: Ink #0F0E0C) â€” this
        # colour set was added 2026-06-07 specifically for the launch screen, since
        # UIColorName resolves against the asset catalog, not Swift colour extensions.
        # UIImageName centers the composite splash (icon + wordmark + tagline) on the
        # background. launch-splash.imageset added 2026-06-09 (task 4.7): two path-only
        # SVGs (190Ă—280pt viewBox), dark/light adaptive, original rendering intent.
        UILaunchScreen:
          UIColorName: "ck-background"
          UIImageName: "launch-splash"
          UIImageRespectsSafeAreaInsets: false
        UIApplicationSupportsIndirectInputEvents: true
        # App uses only standard iOS encryption (AES-256-GCM via CryptoKit,
        # HKDF/HMAC-SHA-256). No proprietary crypto, no export-controlled
        # algorithms beyond what's exempt under US BIS 740.17(b)(2). Declaring
        # this here lets TestFlight/App Store skip the annual export-compliance
        # questionnaire on every upload.
        ITSAppUsesNonExemptEncryption: false
        # Required so BGTaskScheduler will register the sync refresh task â€”
        # without this, BackgroundTasks rejects the registration at launch
        # ("com.considus.catchlight.sync is not advertised in the application's
        # Info.plist").
        BGTaskSchedulerPermittedIdentifiers:
          - com.considus.catchlight.sync
        # Task 6.19 â€” Spotlight deep-link activity type. iOS uses this to
        # dispatch `application(_:continue:)` (SwiftUI's
        # `.onContinueUserActivity`) when the user taps a Catchlight result
        # in Spotlight search. Must match
        # `SpotlightConstants.userActivityType` in CatchlightCore.
        NSUserActivityTypes:
          - com.considus.catchlight.viewTake
        # Portrait-only â€” onboarding layout (StepScaffold, Dynamic Island padding,
        # ScrollView safe-area handling) is designed for portrait. UIRequiresFullScreen
        # is needed alongside a restricted orientation set to silence Xcode's
        # "All interface orientations must be supported unless the app requires
        # full screen" validation warning.
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
    entitlements:
      # XcodeGen rewrites this file on every `generate` run. The contents below
      # ARE the source of truth â€” do not hand-edit Catchlight.entitlements; edit
      # the properties here and re-run xcodegen. (Hand-edits get wiped on the
      # next generate; we hit this on 2026-06-06.)
      path: Catchlight/Resources/Catchlight.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.considus.catchlight
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.considus.catchlight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.considus.catchlight   # brief Â§3.1
        CODE_SIGN_ENTITLEMENTS: Catchlight/Resources/Catchlight.entitlements
        # Pin signing to Automatic so the Xcode UI can't silently flip the app
        # target to Manual on a future fix-warning prompt. Pre-archive audit
        # 2026-06-07.
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        SWIFT_OBJC_BRIDGING_HEADER: ""
    dependencies:
      - package: CatchlightCore
        product: CatchlightCore

  CatchlightTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/CatchlightCoreTests
      # `EnglishWordlistTests` loads bip39-english.txt from
      # `Bundle(for: Self.self)` (the test bundle). Without this entry the
      # resource is only in the app bundle and the test fails on CI with
      # "bip39-english.txt missing from app bundle".
      - path: Catchlight/Resources/bip39-english.txt
        buildPhase: resources
    settings:
      base:
        # Device code-signing requires an Info.plist on the test bundle. We don't
        # need any custom keys, so let Xcode synthesize one. Without this, running
        # tests on a physical iPhone fails with "Cannot code sign because the
        # target does not have an Info.plist fileâ€¦" (hit 2026-06-06 on iPhone 17).
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.considus.catchlight.tests
    dependencies:
      - target: Catchlight
      - package: CatchlightCore
        product: CatchlightCore

  # Task 7.4 / 7.5 â€” XCUITest target for the six core flows + the two-tap
  # regression anchor. UI tests drive the real app via `XCUIApplication`; the app
  # detects the `--uitesting` launch argument (see Wiring.makeAppModel) and skips
  # onboarding into an InMemoryTakeStore seeded with two known Takes, so every
  # test starts from a known resting state without touching Keychain or SQLite.
  CatchlightUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/CatchlightUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.considus.catchlight.uitests
    dependencies:
      - target: Catchlight

# XcodeGen auto-discovery puts `CatchlightTests` into the Catchlight scheme's
# test action but does NOT add the `bundle.ui-testing` target. We declare the
# scheme so a single `xcodebuild test -scheme Catchlight` invocation runs both
# the unit-test bundle and the UI-test bundle (Workplan 7.4 / 7.5). Nothing else
# about the scheme is customised â€” build/run/profile/analyse use XcodeGen
# defaults.
schemes:
  Catchlight:
    build:
      targets:
        Catchlight: all
    run:
      # Task 6.20 â€” Debug run action uses the local StoreKit config so the
      # paywall can be exercised in the simulator without sandbox-tester
      # accounts. Production sales (Release archives) go through the real
      # App Store; this binding is on the Debug scheme only.
      storeKitConfiguration: Catchlight/Resources/Catchlight.storekit
    test:
      # Tests also use the local StoreKit config so any test that touches the
      # paywall isn't talking to live App Store servers.
      storeKitConfiguration: Catchlight/Resources/Catchlight.storekit
      targets:
        - CatchlightTests
        - CatchlightUITests

# v1.1 extension targets (Share Extension, WidgetKit, App Intents) are NOT defined
# here â€” they are out of scope for v1.0 (brief Â§14). Their PREREQUISITES (App Group
# + shared Keychain access group) are already configured in the entitlements above,
# so adding them later requires no migration (brief Â§10.1).
